<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="theme.css">

   <style>
        body{
            background: #f5f7fa;
            min-height: 100vh;
        }

        .container-fluid{
            min-height: 100vh;
        }

        .left-panel{
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 50px;
        }

        .login-card{
            background: white;
            border-radius: 15px;
            padding: 35px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .right-panel{
            padding: 0;
        }

        .right-panel img{
            width: 100%;
            height: 100vh;
            object-fit: cover;
        }

        .btn{
            min-width: 120px;
        }
    </style>
</head>

<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-4 left-panel">
                <div class="login-card">
                    <h2 class="text-center mb-4"><strong>Smart Expense & Receipt Management System</strong></h2>
                
                    <form class="needs-validation" novalidate>
                        <p class="mb-3 text-danger" id="message"></p>

                        <label class="form-label">Username</label>
                        <br>
                        <input type="text" class="form-control" id="inputUsername" required placeholder="e.g. Jason Wong">
                        <div class="invalid-feedback">Username is required</div>

                        <br>
                        <label class="form-label">Password</label>
                        <br>
                        <input type="password" class="form-control" id="inputPassword" required placeholder="password">
                        <div class="invalid-feedback">Password is required</div>
                        
                        <div class="form-check mt-2">
                            <input class="form-check-input" type="checkbox" id="showPassword">
                            <label class="form-check-label" for="showPassword">Show Password</label>
                        </div>
                        
                        <br>
                        <button class="btn btn-secondary w-40" id="login" type="submit" >Login</button>
                        
                        <button class="btn btn-secondary w-40" id="register" type="button" onclick="window.location.href='register.html'" >Register</button>
                    </form>
                </div>
            </div>
            <div class="col-md-8 right-panel">
                <img src="templates/login-image.png" alt="login Image">
            </div>
            

        </div>

        
    </div>
    

    <script>
       const form = document.querySelector("form");

        form.addEventListener("submit", function(event) {

        event.preventDefault();

            if (!form.checkValidity()) {
                event.stopPropagation();
            }else{
                login();
            }

            form.classList.add("was-validated");
            
        });
    </script>

    <script src="login.js"></script>

</body>


</html>
