<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="theme.css"> 

       <style>
        body{
            background: #f5f7fa;
            min-height: 100vh;
        }

        .container-fluid{
            min-height: 100vh;
        }

        .left-panel{
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 50px;
        }

        .register-card{
            background: white;
            border-radius: 15px;
            padding: 35px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .right-panel{
            padding: 0;
        }

        .right-panel img{
            width: 100%;
            height: 100vh;
            object-fit: cover;
        }

        .btn{
            min-width: 120px;
        }
    </style>

</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-4 left-panel">
                <div class="register-card">
                    <h1 class="text-center"><strong>Register</strong></h1>
                    <form class="needs-validation" novalidate>
                        <label class="form-label">Username</label>
                        <input id="inputUsername" class="form-control" type="text" placeholder="e.g. Jason Wong" required>
                        <div class="invalid-feedback">Username required</div>

                        <label class="form-label">Email</label><br>
                        <input class="form-control" id="inputEmail" type="email" placeholder="example@gmail.com" required>
                        <div class="invalid-feedback">Email required</div>

                        <label class="form-label">Phone number</label>
                        <input class="form-control" id="inputPhone" placeholder="0123456789" required>
                        <div class="invalid-feedback">Phone number required</div>

                        <label class="form-label">Password</label><br>
                        <input class="form-control" id="inputPassword" type="password" placeholder="password" required>
                        <div class="invalid-feedback">Password required</div>
                        <div class="form-check mt-2">
                            
                            <small>
                                <input class="form-check-input" type="checkbox" placeholder="password" id="showPassword1">
                                <label class="form-check-label" for="showPassword1">Show Password</label>
                            </small>
                        
                        </div>

                        <label class="form-label">Confirm Password</label><br>
                        <input class="form-control" id="inputConfirm" type="password" required>
                        <div class="invalid-feedback">Confirm password required</div>
            
                        
                        <p id="message" class="text-danger"><small></small></p>
                        <button class="btn btn-secondary w-40" id="register" type="submit" >Register</button>
                        <button class="btn btn-secondary w-40" id="back" type="button" onclick="window.location.href='login.html'" >Back</button>
                    </form>
                </div>
            </div>

            <div class="col-md-8 right-panel">
                <img src="templates/register-image.png" alt="register image">
            </div>

        </div>

    </div>

    <script>
       const form = document.querySelector("form");

        form.addEventListener("submit", function(event) {

        event.preventDefault();

        
        if (!form.checkValidity()) {
            event.stopPropagation();
        }else{
            register();                
        }

        form.classList.add("was-validated");
            
        });
    </script>
    
    <script src="register.js"></script>

</body>
</html>
