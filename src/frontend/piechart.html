<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pie Chart</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="theme.css">


</head>
<body>
    <div>
       <nav class="navbar navbar-dark bg-dark">
            <div class="container-fluid">
                <a id="dashboardBtn" class="navbar-brand" href="dashboard.html">Smart Expense</a>

                <div>
                    <a id="expenseBtn" class="btn btn-link text-white" href="expenses.html">Expense</a>
                    <a id="pieChartBtn" class="btn btn-link text-white" href="piechart.html">Pie Chart</a>
                    <a id="settingBtn" class="btn btn-link text-white" href="setting.html">Setting</a>
                    <a id="logoutBtn" class="btn btn-link text-danger" href="#" onclick="logout()">Logout</a>
                </div>
            </div>
        </nav>
    </div>

    <div class="m-2" style="text-align: center;">
      <h3><strong>Expense Analytics</strong></h3>  
    </div>
    
    <div class="card mb-3 p-4">
        <div class="row">
            <div class="col-md-6">
                <input type="date" id="startDate" class="form-control">
            </div>

            <div class="col-md-6">
                <select class="form-control" id="categoryFilter">
                    <option value="">All Categories</option>
                    <option>Food</option>
                    <option>Transport</option>
                    <option>Shopping</option>
                    <option>Others</option>
                </select>
            </div>

            <div class="col-md-6">
                <input type="date" id="endDate" class="form-control">
            </div>

            <div class="col-md-3">
                <button class="btn btn-primary w-100" onclick="updateChart()">Show</button>
            </div>

            <div class="col-md-3">
                <button class="btn btn-secondary w-100" onclick="resetFilter()">Reset Filter</button>
            </div>

        </div>

        <div class="card shadow-sm p-3 mt-2">
            <div class="row">
                <h5 class="mb-3">Expense Breakdown</h5>

                <div style="height: 400px;" class="col-md-6">
                    <canvas id="expensePieChart"></canvas>
                </div>

                <div class="card shadow-sm col-md-6">  
                    <div class="table-wrapper">
                        <table class="table table-striped">
                            <thead>
                                <tr>
                                    <th>Category</th>
                                    <th id="amountTablePieChart">Total Amount</th>
                                </tr>
                            </thead>

                            <tbody id="chartTableBody"></tbody>

                        </table>
                    </div>
                    
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center p-4 mt-5">

        <h5>About Us</h5>
        <p>
            Smart Expense & Receipt Management System is a student project
            designed to simplify personal finance tracking using web technology.
        </p>
        <small>Developed by: CHAN ZI FENG | UTAR FICT IT IA</small>

    </footer>

    
    <script>
        function logout() {
            localStorage.removeItem("user");
            window.location.href = "login.html";
        }
    </script>

    <script src="currency.js"></script>
    <script src="expenses.js"></script>
    <script src="setting.js"></script>
    <script src="piechart.js"></script>
    <script src="shared_theme.js"></script>
    <script>
        window.addEventListener("load", () => {
            applyTheme(localStorage.getItem("theme") || "light");
        });
    </script>


</body>
</html>
